# Dependabot configuration for xcom-enhanced-gallery
# Optimized for Solid.js userscript project
# Note: test/ directory is managed in a separate repository

version: 2
updates:
  # Root workspace npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    # Cooldown: wait 7 days after a package is released before creating a PR.
    # This mitigates supply-chain attacks where malicious packages are typically
    # detected and removed within days of publication.
    cooldown:
      default-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 5  # 4 groups; allow parallel group PRs
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
    reviewers:
      - "PiesP"

    # Auto-rebase to reduce merge conflicts
    rebase-strategy: "auto"

    # Keep normal updates to direct dependencies; security updates remain
    # governed by the OSV and Dependabot security-update paths.
    allow:
      - dependency-type: "direct"

    # Group updates by category to reduce PR noise
    groups:
      # Production dependency (only solid-js)
      solid:
        patterns:
          - "solid-js"
        update-types:
          - "minor"
          - "patch"

      # Build tooling (Vite + plugins)
      build:
        patterns:
          - "vite"
          - "vite-plugin-*"
        update-types:
          - "minor"
          - "patch"

      # TypeScript ecosystem
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"

      # Linting and formatting (Biome + Knip)
      quality:
        patterns:
          - "@biomejs/*"
          - "knip"
        update-types:
          - "minor"
          - "patch"

    # Ignore packages that require manual review for major updates
    ignore:
      # Vite major updates need careful review
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # Solid.js major updates need careful review
      - dependency-name: "solid-js"
        update-types: ["version-update:semver-major"]

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    # Cooldown: wait 7 days after a package is released before creating a PR.
    # This mitigates supply-chain attacks where malicious packages are typically
    # detected and removed within days of publication.
    cooldown:
      default-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 3  # Limit concurrent PRs
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
    reviewers:
      - "PiesP"
    groups:
      actions:
        patterns:
          - "*"
    # pnpm/action-setup@v6 has a known bug (pnpm/action-setup#225) that always
    # installs pnpm v11 beta, ignoring the packageManager field. Skip major
    # upgrades until the bug is resolved upstream.
    ignore:
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]
