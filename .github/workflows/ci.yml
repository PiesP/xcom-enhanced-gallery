name: 🔍 CI Pipeline

on:
  push:
    branches: [master, develop, feature/*, fix/*, chore/*, test-*]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  SKIP_HUSKY: "1"
  HUSKY: "0"
  NODE_ENV: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: Detect docs-only change
    runs-on: ubuntu-latest
    outputs:
      only_docs: ${{ steps.setflag.outputs.only_docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: setflag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          else
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo '')
            HEAD_SHA=$(git rev-parse HEAD)
          fi
          echo "Base: $BASE_SHA"
          echo "Head: $HEAD_SHA"
          if [ -z "$BASE_SHA" ]; then
            echo "only_docs=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:\n$CHANGED"
          if echo "$CHANGED" | grep -qE '^(src/|package.json|tsconfig|vitest|vite|\\.github/workflows/|package-lock.json)'; then
            echo "only_docs=false" >> $GITHUB_OUTPUT
          else
            if echo "$CHANGED" | grep -vqE '\\.(md|MD)$'; then
              echo "only_docs=false" >> $GITHUB_OUTPUT
            else
              echo "only_docs=true" >> $GITHUB_OUTPUT
            fi
          fi

  core:
    needs: detect_changes
    if: needs.detect_changes.outputs.only_docs == 'false'
    uses: ./.github/workflows/_core-ci.yml
    with:
      node_matrix: '["18","20"]'

  build:
    name: Build (Node 20)
    needs: core
    if: needs.detect_changes.outputs.only_docs == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci --prefer-offline --no-audit
      - name: Build dev
        run: npm run build:dev
      - name: Build prod
        run: npm run build:prod
      - name: Bundle size list
        run: ls -lah dist/
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: dist/
          retention-days: 7

  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [detect_changes, core, build]
    if: always()
    steps:
      - name: Generate summary
        shell: bash
        run: |
          echo "## 🔍 CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.detect_changes.outputs.only_docs }}" = "true" ]; then
            echo "Docs-only changes detected. Heavy jobs skipped." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          echo "- Core (quality + tests): ${{ needs.core.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.core.result }}" = "success" ] && [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some checks failed. Review logs." >> $GITHUB_STEP_SUMMARY
          fi
