name: 🔒 Security Scanning

# Responsibility: Security analysis for Node.js + pnpm project
# - PR/merge queue gate: OSV diff scan
# - Scheduled/manual depth: OSV full scan + Semgrep SARIF upload
#
# Note: test/ directory is managed in a separate repository
# Trigger: PR to master + merge queue + weekly schedule + manual

on:
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "0 1 * * 0" # Weekly on Sundays at 1 AM UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan-pr:
    name: 🛡️ OSV Vulnerability Scan (PR Diff)
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --lockfile=pnpm-lock.yaml
        ./
      # PR diff scans fail when a change introduces new vulnerabilities.
      fail-on-vuln: true

  osv-scan-full:
    name: 🛡️ OSV Vulnerability Scan (Full)
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --lockfile=pnpm-lock.yaml
        ./
      # Full scans remain non-blocking so newly disclosed advisories do not
      # retroactively break unrelated work.
      fail-on-vuln: false

  semgrep:
    name: 🔍 Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.163.0
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: 🔍 Run Semgrep scan
        run: |
          semgrep scan \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/security-audit \
            --config=p/secrets \
            --sarif \
            --output=semgrep.sarif

      - name: 📊 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: semgrep.sarif
