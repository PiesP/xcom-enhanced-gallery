name: 🔒 Security Scanning

# Responsibility: Security analysis for Node.js + pnpm project
# - PR/merge queue gate: OSV diff scan
# - Scheduled/manual depth: OSV full scan + full-repository Semgrep SARIF upload
#
# Note: test/ directory is managed in a separate repository
# Trigger: PR to master + merge queue + weekly schedule + manual

on:
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "0 1 * * 0" # Weekly on Sundays at 1 AM UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  statuses: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan-pr:
    name: 🛡️ OSV Vulnerability Scan (PR Diff)
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --lockfile=pnpm-lock.yaml
        .
      # PR diff scans fail when a change introduces new vulnerabilities, replacing
      # the broken pnpm audit gate with a workflow-native regression check.
      fail-on-vuln: true

  osv-scan-dispatch:
    name: 🛡️ OSV Vulnerability Scan (PR Diff) / osv-scan
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🛡️ Run OSV scan
        uses: google/osv-scanner-action/osv-scanner-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            -r
            --lockfile=pnpm-lock.yaml
            .

  osv-scan-full:
    name: 🛡️ OSV Vulnerability Scan (Full)
    if: ${{ github.event_name == 'schedule' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --lockfile=pnpm-lock.yaml
        .
      # A scheduled/manual full scan is a release/security gate as well as a
      # reporting job. Keep newly disclosed advisories from being silently
      # accepted until a dependency update is prepared.
      fail-on-vuln: true

  codeql:
    name: 🔎 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: 🔧 Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: 🔎 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: 🔍 Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    permissions:
      contents: read
      security-events: write
    # semgrep/semgrep:1.163.0 — last checked: 2026-06-11
    # Check for updates: https://github.com/semgrep/semgrep/releases
    container:
      image: semgrep/semgrep:1.163.0@sha256:bc8b15e245d7bd392bcadce7ef4db36601b375fab35bfd8070ed8ae3d7824c74
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: 🔍 Run Semgrep scan
        run: |
          set -euo pipefail
          semgrep scan \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/security-audit \
            --config=p/secrets \
            --error \
            --sarif \
            --output=semgrep.sarif \
            .

      - name: 📊 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  report-pr-gate-statuses:
    name: Report PR gate statuses
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs: [osv-scan-dispatch, semgrep]
    runs-on: ubuntu-latest
    steps:
      - name: Publish required commit statuses
        env:
          GH_TOKEN: ${{ github.token }}
          OSV_RESULT: ${{ needs.osv-scan-dispatch.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
        run: |
          set -euo pipefail

          publish_status() {
            local context="$1"
            local result="$2"
            local state=success
            if [[ "$result" != "success" ]]; then
              state=failure
            fi

            gh api --method POST \
              "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
              -f "state=$state" \
              -f "context=$context" \
              -f "description=workflow_dispatch result: $result" \
              -f "target_url=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
              >/dev/null
          }

          publish_status "🛡️ OSV Vulnerability Scan (PR Diff) / osv-scan" "$OSV_RESULT"
          publish_status "🔍 Static Analysis (Semgrep)" "$SEMGREP_RESULT"
