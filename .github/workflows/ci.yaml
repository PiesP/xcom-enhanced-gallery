name: 🏗️ CI

# Responsibility: fast, independent verification for pull requests and merge queue
# - Run static quality checks
# - Run unit tests with coverage thresholds
# - Run browser E2E tests
# - Build all distribution targets
# - Check source duplication
#
# Expensive mutation testing lives in deep-checks.yaml so PR feedback is not
# blocked by a long-running, resource-heavy analysis.
#
# Triggered on: Push/PR to master + merge queue

# Security: All third-party actions pinned to full commit SHAs.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

env:
  NODE_VERSION: "26"

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ✅ Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Run quality gate
        run: pnpm quality:ci

  unit:
    name: 🧪 Unit + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests and coverage thresholds
        run: pnpm test:cov

  e2e:
    name: 🎭 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 🎭 Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎭 Run E2E tests
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e

  build:
    name: 🏗️ Build all targets
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build all targets
        run: pnpm build:all:ci

      - name: 📊 Upload userscript artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: userscript-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: 📊 Upload Chrome extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: extension-chrome-${{ github.sha }}
          path: dist-extension/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: 📊 Upload Firefox extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: extension-firefox-${{ github.sha }}
          path: dist-extension-firefox/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

  duplication:
    name: 🔍 Duplication
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 🔧 Install nose
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/install-nose.sh

      - name: 🔎 Check for new duplication
        run: nose query src --baseline .nose-baseline.json --fail-on new
