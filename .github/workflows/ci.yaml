name: 🏗️ CI

# Responsibility: Required verification for pull requests and merge queue
# - Install dependencies with pnpm
# - Run the repository quality gate
# - Build the production userscript
# - Build Chrome and Firefox extension packages
#
# Triggered on: Push/PR to master + merge queue

# Security: All third-party actions pinned to full commit SHAs.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

env:
  NODE_VERSION: "26"

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ✅ Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Run quality gate and build all targets
        run: |
          pnpm build
          pnpm build:extension
          pnpm build:extension:firefox

      - name: 📊 Upload userscript artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: userscript-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: 📊 Upload Chrome extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: extension-chrome-${{ github.sha }}
          path: dist-extension/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: 📊 Upload Firefox extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: extension-firefox-${{ github.sha }}
          path: dist-extension-firefox/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

  duplication:
    name: 🔍 Check duplication
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔧 Install nose
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/corca-ai/nose/releases/latest/download/nose-cli-installer.sh | sh

      - name: 🔎 Check for new duplication
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          nose query src --baseline .nose-baseline.json --fail-on new
