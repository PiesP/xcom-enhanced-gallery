name: 🏗️ CI

# Responsibility: fast, independent verification for pull requests and merge queue
# - Run static quality checks
# - Run unit tests with coverage thresholds
# - Run browser E2E tests
# - Build all distribution targets
# - Check source duplication
#
# Expensive mutation testing lives in deep-checks.yaml so PR feedback is not
# blocked by a long-running, resource-heavy analysis.
#
# Triggered on: Push/PR to master + merge queue

# Security: All third-party actions pinned to full commit SHAs.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

env:
  NODE_VERSION: "26"

permissions:
  contents: read
  statuses: write

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ✅ Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Run quality gate
        run: pnpm quality

  unit:
    name: 🧪 Unit + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests and coverage thresholds
        run: pnpm test:cov

  e2e:
    name: 🎭 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 🎭 Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build userscript bundles
        run: pnpm clean && pnpm build:ci && pnpm build:dev

      - name: 🎭 Run E2E tests
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e

  build:
    name: 🏗️ Build all targets
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build all targets
        run: pnpm build:all:ci

      - name: 📊 Upload userscript artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: userscript-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: 📊 Upload Chrome extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: extension-chrome-${{ github.sha }}
          path: dist-extension/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: 📊 Upload Firefox extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: extension-firefox-${{ github.sha }}
          path: dist-extension-firefox/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

  duplication:
    name: 🔍 Duplication
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 🔧 Install nose
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/install-nose.sh

      - name: 🔎 Check for new duplication
        run: nose query src --baseline .nose-baseline.json --fail-on new

  report-pr-gate-statuses:
    name: Report PR gate statuses
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs: [quality, unit, e2e, build, duplication]
    runs-on: ubuntu-latest
    steps:
      - name: Publish required commit statuses
        env:
          GH_TOKEN: ${{ github.token }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DUPLICATION_RESULT: ${{ needs.duplication.result }}
        run: |
          set -euo pipefail

          publish_status() {
            local context="$1"
            local result="$2"
            local state=success
            if [[ "$result" != "success" ]]; then
              state=failure
            fi

            gh api --method POST \
              "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
              -f "state=$state" \
              -f "context=$context" \
              -f "description=workflow_dispatch result: $result" \
              -f "target_url=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
              >/dev/null
          }

          publish_status "pr-gate/quality" "$QUALITY_RESULT"
          publish_status "pr-gate/unit" "$UNIT_RESULT"
          publish_status "pr-gate/e2e" "$E2E_RESULT"
          publish_status "pr-gate/build" "$BUILD_RESULT"
          publish_status "pr-gate/duplication" "$DUPLICATION_RESULT"
