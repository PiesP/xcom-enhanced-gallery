name: Update browser-core

on:
  repository_dispatch:
    types: [browser-core-updated]
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      core_sha:
        description: Optional browser-core commit SHA (defaults to master)
        required: false
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

env:
  CORE_REPOSITORY: PiesP/browser-core

concurrency:
  group: browser-core-update
  cancel-in-progress: true

jobs:
  update:
    name: Create browser-core update PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true

      - name: Update submodule and create PR
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_CORE_REPOSITORY: ${{ github.event.client_payload.core_repository }}
          EVENT_CORE_SHA: ${{ github.event.client_payload.core_sha }}
          INPUT_CORE_SHA: ${{ inputs.core_sha }}
        run: |
          set -euo pipefail

          if [[ -n "$EVENT_CORE_SHA" ]]; then
            CORE_SHA="$EVENT_CORE_SHA"
            if [[ "$EVENT_CORE_REPOSITORY" != "$CORE_REPOSITORY" ]]; then
              echo "::error::Unexpected core repository: $EVENT_CORE_REPOSITORY"
              exit 1
            fi
          elif [[ -n "$INPUT_CORE_SHA" ]]; then
            CORE_SHA="$INPUT_CORE_SHA"
          else
            CORE_SHA="$(git ls-remote "https://github.com/$CORE_REPOSITORY.git" refs/heads/master | cut -f1)"
          fi

          if [[ ! "$CORE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Unable to resolve a valid browser-core commit SHA"
            exit 1
          fi

          SHORT_SHA="${CORE_SHA:0:12}"
          BRANCH="automation/update-browser-core"
          BRANCH_EXISTS=false

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git switch -C "$BRANCH" "origin/$BRANCH"
            BRANCH_EXISTS=true
          else
            git switch -c "$BRANCH"
          fi

          # Keep the long-lived automation branch current so strict branch
          # protection does not leave a passing update PR behind master.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH_HEAD_BEFORE_SYNC="$(git rev-parse HEAD)"
          git merge --no-edit origin/master
          BRANCH_SYNCED=false
          if [[ "$(git rev-parse HEAD)" != "$BRANCH_HEAD_BEFORE_SYNC" ]]; then
            BRANCH_SYNCED=true
          fi

          git -C packages/core fetch --no-tags origin "$CORE_SHA"
          git -C packages/core checkout --detach "$CORE_SHA"

          UPDATED=false
          BRANCH_CHANGED=false
          if ! git diff --quiet -- packages/core; then
            git add packages/core
            git commit -m "chore(deps): update browser-core to $SHORT_SHA"
            git push --set-upstream origin "$BRANCH"
            UPDATED=true
            BRANCH_CHANGED=true
          elif [[ "$BRANCH_SYNCED" == true ]]; then
            git push --set-upstream origin "$BRANCH"
            BRANCH_CHANGED=true
          fi

          if [[ "$BRANCH_CHANGED" == true ]]; then
            gh workflow run "🏗️ CI" --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
            gh workflow run "🔒 Security Scanning" --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
          fi

          OPEN_PR="$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -n "$OPEN_PR" ]]; then
            if [[ "$UPDATED" == true ]]; then
              echo "Updated the existing browser-core PR to $SHORT_SHA."
            elif git diff --quiet "origin/master...HEAD" -- . ':(exclude)packages/core'; then
              if git diff --quiet "origin/master...HEAD" -- .; then
                gh pr close "$OPEN_PR" --comment "Closing this stale update PR because master already contains browser-core $SHORT_SHA."
                echo "Closed stale browser-core update PR #$OPEN_PR."
              else
                echo "Synchronized existing browser-core PR #$OPEN_PR with master."
              fi
            else
              echo "::error::Open browser-core PR #$OPEN_PR has unrelated changes; leaving it open for manual review."
              exit 1
            fi
            exit 0
          fi

          if [[ "$UPDATED" != true ]] && git diff --quiet "origin/master...HEAD" -- .; then
            echo "browser-core is already at $SHORT_SHA and no update PR is open."
            exit 0
          fi

          PR_BODY="$(cat <<EOF
          This PR updates the packages/core git submodule to browser-core commit $CORE_SHA.

          The existing repository CI will validate the updated shared package against this project.

          Generated by the browser-core update workflow.
          EOF
          )"

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore(deps): update browser-core to $SHORT_SHA" \
            --body "$PR_BODY"
