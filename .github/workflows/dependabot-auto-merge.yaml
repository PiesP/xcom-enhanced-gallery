name: 🤖 Dependabot Auto-Merge

# Responsibility: Auto-merge safe dependabot PRs
# - GitHub Actions: patch/minor updates
# - npm: patch/minor updates for specific safe packages
# - Requires CI to pass first (via GitHub branch protection)
# Note: test/ directory is managed in a separate repository
#
# Security: Uses pull_request_target for the write-scoped merge operation.
# No pull-request code is checked out or executed.

on:
  # Target events are safe here because this workflow never checks out or runs
  # pull-request code; it only reads Dependabot metadata and queues a merge.
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot:
    name: 🤖 Auto-Merge Dependabot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: 📥 Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: 🔍 Decide merge eligibility
        id: decide
        env:
          ECOSYSTEM: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
          DEPENDENCIES: ${{ steps.dependabot-metadata.outputs.dependency-names }}
          ALERT_STATE: ${{ steps.dependabot-metadata.outputs.alert-state }}
        run: |
          set -euo pipefail

          SHOULD_MERGE="false"
          REASON="manual review required"

          if [[ "$ALERT_STATE" == "open" ]]; then
            SHOULD_MERGE="true"
            REASON="security advisory update (open alert)"
          elif [[ "$ECOSYSTEM" == "github-actions" && ("$UPDATE_TYPE" == "version-update:semver-patch" || "$UPDATE_TYPE" == "version-update:semver-minor") ]]; then
            SHOULD_MERGE="true"
            REASON="safe github-actions patch/minor"
          elif [[ ("$ECOSYSTEM" == "npm" || "$ECOSYSTEM" == "npm_and_yarn") && ("$UPDATE_TYPE" == "version-update:semver-patch" || "$UPDATE_TYPE" == "version-update:semver-minor") ]]; then
            SAFE="true"
            IFS=',' read -ra DEPS <<< "$DEPENDENCIES"
            for dep in "${DEPS[@]}"; do
              dep=$(echo "$dep" | xargs)
              case "$dep" in
                typescript|knip|vite|vite-plugin-solid|@types/*|@biomejs/*|solid-js)
                  ;;
                *)
                  SAFE="false"
                  ;;
              esac
            done

            if [[ "$SAFE" == "true" ]]; then
              SHOULD_MERGE="true"
              REASON="safe npm patch/minor set"
            fi
          fi

          echo "should_merge=$SHOULD_MERGE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: 🔄 Queue auto-merge
        if: steps.decide.outputs.should_merge == 'true'
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_URL"
          echo "✅ Auto-merge queued: ${{ steps.decide.outputs.reason }}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⏭️ Keep for manual review
        if: steps.decide.outputs.should_merge != 'true'
        run: |
          echo "⏭️ Manual review required"
          echo "Reason: ${{ steps.decide.outputs.reason }}"
