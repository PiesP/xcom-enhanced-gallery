name: 🚀 Release

# Responsibility: Publish tagged releases for userscript and browser extensions
# - Build release assets from the tagged commit (userscript + Chrome + Firefox)
# - Package extension ZIPs
# - Attach all assets to GitHub Releases
#
# Trigger: Tag push (v*)

# Security: All third-party actions pinned to full commit SHAs.
on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "26"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: 🚀 Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📝 Determine version
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: 🏗️ Build all targets
        run: |
          pnpm build
          pnpm build:extension
          pnpm build:extension:firefox

      - name: 📦 Package extensions
        run: pnpm package:extension

      - name: 🏷️ Prepare release assets
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS.txt
          cd ..
          echo "Checksums:"
          cat dist/SHA256SUMS.txt

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@7b453056312cef401da2a2a4e06e4b5b5f1ac85e # v2.3.3
        with:
          body: |
            ## Release ${{ steps.version.outputs.version }}

            ### Assets
            - **Userscript**: `xcom-enhanced-gallery.user.js`
            - **Chrome Extension**: `extension-chrome-v${{ steps.version.outputs.version }}.zip`
            - **Firefox Extension**: `extension-firefox-v${{ steps.version.outputs.version }}.zip`
            - **Checksums**: `SHA256SUMS.txt`

            ### Installation
            - **Userscript**: Install via Tampermonkey/Greasemonkey/Violentmonkey
            - **Chrome**: Load unpacked from `dist-extension/` or install from Chrome Web Store
            - **Firefox**: Install from `dist-extension-firefox/` or Firefox Add-ons
          files: |
            dist/*.user.js
            dist/*.zip
            dist/SHA256SUMS.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
