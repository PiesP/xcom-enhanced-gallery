name: 🚀 Release

# Responsibility: validate and publish tagged userscript and browser extension
# releases. Validation runs independently; only publish can write repository state.
#
# Trigger: Tag push (v*)

# Security: All third-party actions pinned to full commit SHAs.

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "26"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: ✅ Release quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Run quality gate
        run: pnpm quality:ci

  unit:
    name: 🧪 Release unit + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests and coverage thresholds
        run: pnpm test:cov

  e2e:
    name: 🎭 Release E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 🎭 Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎭 Run E2E tests
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e

  duplication:
    name: 🔍 Release duplication
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 🔧 Install nose
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/install-nose.sh

      - name: 🔎 Check for new duplication
        run: nose query src --baseline .nose-baseline.json --fail-on new

  mutation:
    name: 🧬 Release mutation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧬 Run mutation gate
        run: pnpm mut:fast

  build:
    name: 🏗️ Build release package
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📝 Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version from tag: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "❌ Tag version $VERSION does not match package.json $PACKAGE_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Release version: $VERSION"

      - name: 🏗️ Build all targets
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          for manifest in extension/manifest.json extension/manifest.firefox.json; do
            if [ -f "$manifest" ]; then
              jq ".version = \"$VERSION\"" "$manifest" > "$manifest.tmp"
              mv "$manifest.tmp" "$manifest"
            fi
          done

          BUILD_VERSION="$VERSION" pnpm build:all:ci

          mkdir -p release-bundle/deploy/dist release-bundle/release
          cp -r dist/* release-bundle/deploy/dist/
          cp -r dist/* release-bundle/release/

          awk 'BEGIN{p=0} /^\/\/ ==UserScript==/{p=1} {if(p) print} /^\/\/ ==\/UserScript==/{exit}' \
            dist/xcom-enhanced-gallery.user.js \
            > release-bundle/release/xcom-enhanced-gallery.meta.js

          (
            cd dist-extension
            zip -qr "$GITHUB_WORKSPACE/release-bundle/release/xcom-enhanced-gallery-chrome.zip" .
          )
          (
            cd dist-extension-firefox
            zip -qr "$GITHUB_WORKSPACE/release-bundle/release/xcom-enhanced-gallery-firefox.zip" .
          )

          (
            cd release-bundle/release
            sha256sum \
              xcom-enhanced-gallery.user.js \
              xcom-enhanced-gallery.meta.js \
              xcom-enhanced-gallery-chrome.zip \
              xcom-enhanced-gallery-firefox.zip \
              > checksums.txt
          )

          cat > release-bundle/release/metadata.json << EOF
          {
            "version": "$VERSION",
            "build_date": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')",
            "commit": "${GITHUB_SHA}",
            "node_version": "${NODE_VERSION}"
          }
          EOF

          CHANGELOG_CONTENT="$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit;
              if ($0 ~ "\\[" ver "\\]") {
                found=1;
                next;
              }
            }
            found { print }
          ' CHANGELOG.md)"
          if [[ -z "${CHANGELOG_CONTENT//[[:space:]]/}" ]]; then
            echo "❌ CHANGELOG.md has no entry for version $VERSION"
            exit 1
          fi

          PREV_VERSION=$(
            {
              printf '%s\n' "$VERSION"
              git tag --list 'v*' | sed 's/^v//'
            } | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -u -V | awk -v ver="$VERSION" '
              $0 == ver { print prev; exit }
              { prev = $0 }
            '
          )
          if [ -n "$PREV_VERSION" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/v${PREV_VERSION}...v${VERSION}"
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          fi

          cat > release-bundle/RELEASE_NOTES.md << EOF
          # 🚀 Release v${VERSION}

          ## 📥 Installation

          ### Userscript

          **[📥 Click here to install](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/xcom-enhanced-gallery.user.js)**

          Requires [Tampermonkey](https://www.tampermonkey.net/) or [Violentmonkey](https://violentmonkey.github.io/).

          ### Chrome / Edge / Brave Extension

          1. Download `xcom-enhanced-gallery-chrome.zip`.
          2. Navigate to `chrome://extensions`.
          3. Enable Developer mode and load the ZIP.

          ### Firefox Extension

          1. Download `xcom-enhanced-gallery-firefox.zip`.
          2. Navigate to `about:debugging#/runtime/this-firefox`.
          3. Select the ZIP with Load Temporary Add-on.

          ---

          ## 📝 What's Changed

          ${CHANGELOG_CONTENT}

          **[📋 Full Changelog](${COMPARE_URL})**

          ## 📋 Build Details

          - **Commit**: \`${GITHUB_SHA}\`
          - **Built**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Node.js**: \`${NODE_VERSION}\`
          EOF

      - name: 📊 Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bundle-${{ github.sha }}
          path: release-bundle/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

  publish:
    name: 🏷️ Publish GitHub Release
    needs: [quality, unit, e2e, duplication, mutation, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: 📥 Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-bundle-${{ github.sha }}
          path: release-bundle

      # Keep the existing /dist release-branch layout; the userscript URLs
      # in this project intentionally point at /release/dist/.
      - name: 📤 Publish to release branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: release-bundle/deploy
          force_orphan: true

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-bundle/RELEASE_NOTES.md
          files: |
            release-bundle/release/xcom-enhanced-gallery.user.js
            release-bundle/release/xcom-enhanced-gallery.meta.js
            release-bundle/release/xcom-enhanced-gallery-chrome.zip
            release-bundle/release/xcom-enhanced-gallery-firefox.zip
            release-bundle/release/checksums.txt
            release-bundle/release/metadata.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  purge-cdn:
    name: 🔄 Purge jsDelivr CDN cache
    needs: publish
    if: ${{ needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: 🔄 Purge userscript and metadata cache
        run: |
          set -euo pipefail
          for asset in xcom-enhanced-gallery.user.js xcom-enhanced-gallery.meta.js; do
            purge_url="https://purge.jsdelivr.net/gh/${{ github.repository }}@release/dist/${asset}"
            purge_response="$(curl --fail --silent --show-error --location \
              --proto '=https' --tlsv1.2 "$purge_url")"
            echo "$purge_response" | jq -e '.success == true' >/dev/null
          done
