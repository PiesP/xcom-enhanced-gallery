name: 🚀 Release

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "package.json"
      - "vite.config.ts"
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  NODE_VERSION: "20"
  VITEST_MODE: "ci"
  NODE_ENV: "production"
  ENABLE_BUNDLE_ANALYSIS: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changes:
    name: 🔍 Check Version Changes
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      current_version: ${{ steps.check.outputs.current_version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Check version changes
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Manual release triggered"
          else
            PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")

            if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "✅ Version changed: $PREV_VERSION → $CURRENT_VERSION"
            else
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "⏭️ No version change detected"
            fi
          fi

          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

  build-and-release:
    name: 🏗️ Build and Release
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit --legacy-peer-deps

      - name: 🔍 Type checking
        run: npm run typecheck

      - name: � Lint code
        run: npm run lint

      - name: 🎨 Format check
        run: npm run format:check

      - name: 🧪 Run CI mode tests (v8 coverage)
        run: npm run test:ci

      - name: 📊 Upload coverage (optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: 📈 Bump version (if manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          echo "🔄 Bumping version (${{ inputs.version_type }})..."
          npm version ${{ inputs.version_type }} --no-git-tag-version

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "✅ Version bumped to: $NEW_VERSION"

          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git push

      - name: 📝 Get final version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: 🏗️ Build production (with bundle analysis)
        run: |
          echo "🚀 Building production version (bundle analysis enabled)..."
          npm run build:prod
          echo "📦 Dist contents:"
          ls -lah dist/ || dir dist
          if [ -f dist/bundle-analysis.json ]; then
            echo "📊 Bundle analysis:" && cat dist/bundle-analysis.json
            TOTAL_SIZE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('dist/bundle-analysis.json','utf8')).totalSize)")
            MAX=$((500*1024))
            if [ "$TOTAL_SIZE" -gt "$MAX" ]; then
              echo "⚠️ Bundle size exceeds 500KB budget: $TOTAL_SIZE bytes";
            else
              echo "✅ Bundle size within budget: $TOTAL_SIZE bytes";
            fi
          else
            echo "⚠️ bundle-analysis.json not found";
          fi

      - name: 📦 Create release package
        run: |
          echo "📦 Preparing release files..."
          mkdir -p release

          # Copy userscript
          cp dist/xcom-enhanced-gallery.user.js release/

          # Generate checksums
          cd release
          sha256sum xcom-enhanced-gallery.user.js > checksums.txt
          cd ..

          # Create metadata
          cat > release/metadata.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "build_date": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')",
            "commit": "${{ github.sha }}",
            "node_version": "${{ env.NODE_VERSION }}",
            "build_type": "production",
            "vitest_mode": "${{ env.VITEST_MODE }}"
          }
          EOF

          # Create release notes
          cat > release/RELEASE_NOTES.md << EOF
          # 🚀 Release v${{ steps.version.outputs.version }}

          ## 📥 Installation

          **[📥 Click here to install userscript](https://github.com/PiesP/xcom-enhanced-gallery/releases/download/v${{ steps.version.outputs.version }}/xcom-enhanced-gallery.user.js)**

          ## 📋 What's Changed

          - Built from commit: \`${{ github.sha }}\`
          - Release date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ## 🔧 Technical Details

          - Version: \`${{ steps.version.outputs.version }}\`
          - Node.js: \`${{ env.NODE_VERSION }}\`
          - Build: Production optimized

          EOF

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 🚀 Release v${{ steps.version.outputs.version }}
          body_path: release/RELEASE_NOTES.md
          files: |
            release/xcom-enhanced-gallery.user.js
            release/checksums.txt
            release/metadata.json
            dist/bundle-analysis.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-v${{ steps.version.outputs.version }}
          path: release/
          retention-days: 30
