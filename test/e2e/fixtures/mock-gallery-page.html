<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Tweet - X.com Enhanced Gallery Test</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background: #000; color: #e7e9ea; }
    .tweet-container { max-width: 500px; margin: 0 auto; }
    .outside-button { margin-top: 20px; padding: 10px 20px; background: #1d9bf0; color: #fff; border: none; border-radius: 20px; cursor: pointer; display: block; }
    img { max-width: 100%; height: auto; display: block; }
    .tweet-photo { margin: 4px 0; }
  </style>
</head>
<body>
  <main>
    <div class="tweet-container">
      <article data-testid="tweet">
        <div>
          <div>
            <span>Test User</span>
            <span>@testuser</span>
          </div>
          <div>
            <a href="/testuser/status/1234567890123456789">
              <time datetime="2026-06-25T10:00:00.000Z">10:00 AM · Jun 25, 2026</time>
            </a>
          </div>
        </div>
        <div data-testid="tweetText">
          <p>Here are some test images for the gallery:</p>
        </div>
        <div data-testid="tweetPhoto" class="tweet-photo">
          <img src="https://pbs.twimg.com/media/GkE1234ABCDEF.jpg?format=jpg&amp;name=large" alt="Mountain landscape" />
        </div>
        <div data-testid="tweetPhoto" class="tweet-photo">
          <img src="https://pbs.twimg.com/media/GkE5678GHIJKL.jpg?format=jpg&amp;name=large" alt="Ocean sunset" />
        </div>
        <div data-testid="tweetPhoto" class="tweet-photo">
          <img src="https://pbs.twimg.com/media/GkE9012MNOPQR.jpg?format=jpg&amp;name=large" alt="Forest path" />
        </div>
      </article>
    </div>
    <button class="outside-button" id="outside-button" data-testid="outside-button">Button outside gallery</button>
  </main>
</body>
</html>
